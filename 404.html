<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #00a878;
            line-height: 1;
            margin-bottom: 20px;
        }

        .message {
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .countdown {
            font-size: 1.1rem;
            color: #666666;
        }

        .countdown span {
            color: #00a878;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .home-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #00a878;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .home-link:hover {
            background: #00c490;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <p class="message">页面不存在</p>
        <p class="countdown"><span id="countdown">3</span> 秒后跳转至首页...</p>
        <a href="/" class="home-link">立即返回</a>
    </div>

    <script>
        let seconds = 3;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.replace('/');
            }
        }, 1000);
    </script>
</body>
</html>
